<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAG Gomoku</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="panel control-panel">
      <div class="eyebrow">Local Browser Match</div>
      <h1>MAG Gomoku</h1>
      <p class="lede">直接在浏览器里与任意已注册 opponent 或 minimax 对弈。</p>

      <label class="field">
        <span>Mode</span>
        <select id="mode-select">
          <option value="human">Human vs AI</option>
          <option value="auto">AI vs AI (watch)</option>
        </select>
      </label>

      <!-- Human vs AI controls -->
      <div id="human-controls">
        <label class="field">
          <span>Opponent</span>
          <select id="opponent-select"></select>
        </label>
        <label class="field">
          <span>Your Color</span>
          <select id="color-select">
            <option value="black">Black</option>
            <option value="white">White</option>
          </select>
        </label>
        <label class="field">
          <span>MCTS Sims</span>
          <select id="mcts-select">
            <option value="0">Off (pure network)</option>
            <option value="25">25 (fast)</option>
            <option value="50" selected>50 (balanced)</option>
            <option value="100">100 (strong)</option>
            <option value="200">200 (slow)</option>
          </select>
        </label>
      </div>

      <!-- AI vs AI controls -->
      <div id="auto-controls" style="display:none">
        <label class="field">
          <span>Black AI</span>
          <select id="black-select"></select>
        </label>
        <label class="field">
          <span>Black MCTS</span>
          <select id="black-mcts">
            <option value="0">Off</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
        <label class="field">
          <span>White AI</span>
          <select id="white-select"></select>
        </label>
        <label class="field">
          <span>White MCTS</span>
          <select id="white-mcts">
            <option value="0">Off</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="start-button" class="primary">Start New Game</button>
        <button id="reset-button">Reset Current Game</button>
        <button id="step-button" style="display:none">Step (1 move)</button>
        <button id="autoplay-button" style="display:none">Auto Play ▶</button>
      </div>

      <div class="status-block">
        <div class="status-title">Session</div>
        <div id="status-text" class="status-text">Loading opponents…</div>
      </div>
    </aside>

    <main class="board-stage panel">
      <div class="stage-header">
        <div>
          <div class="eyebrow">Interactive Board</div>
          <h2 id="match-title">No Game</h2>
        </div>
        <div id="turn-pill" class="turn-pill">Idle</div>
      </div>
      <div class="board-wrap">
        <canvas id="board-canvas" width="720" height="720"></canvas>
      </div>
    </main>

    <aside class="panel info-panel">
      <div class="eyebrow">Game State</div>
      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-label">Opponent</span>
          <strong id="opponent-name">—</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Human</span>
          <strong id="human-color">—</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Moves</span>
          <strong id="move-count">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Result</span>
          <strong id="result-text">—</strong>
        </div>
      </div>

      <div class="move-panel">
        <div class="move-panel-header">
          <span>Move List</span>
          <span id="last-move-text">Last: —</span>
        </div>
        <ol id="move-list" class="move-list"></ol>
      </div>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
